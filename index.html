<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line's Birthday 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
        /* yung pinaka card part "happ bday line" change mo dto ung mga color,fonts etc.. */
    body { 
background-color: #DCA7EB; 
            /* paper texture dto */
    background-image: radial-gradient(#b078c2 1px, transparent 1px);
    background-size: 20px 20px;
    color: #333333; 
    font-family: 'Patrick Hand', cursive; 
    text-align: center; 
     margin: 0; 
    overflow-x: hidden;
        }

        /* Entry Overlay - pwede baguhin bg color ng pic ng fxcs logo */
 #entry-button { 
  position: fixed; 
     inset: 0; 
 background: #A479BA; 
    z-index: 1000; 
display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    transition: opacity 0.5s ease;
        }

 .main-container { padding: 60px 20px; } 
        
     /* bday card (cut papers) */
    .bday-card {
     background: #ffffff; 
     color: #333333; 
     padding: 40px; 
     /* borders - wobbly hand-cut look */
    border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
 width: 85%;
    max-width: 400px; 
    margin: 0 auto; 
     border: 4px solid #602d91;
     box-shadow: 8px 10px 0px #7F0BB0;
    transform: rotate(-1deg);
        }

        /* dto naman style part san sila mag lagay ng messages pwede change colors and fonts pad etc... */
        .guestbook { 
            background: #e396ff; 
            color: #000000; 
            margin-top: 50px; 
            padding: 50px 20px; 
            border-top: 5px solid #602d91;
            /* Zigzag shadow */
            box-shadow: inset 0 10px 10px rgba(0,0,0,0.05);
        }

        input, textarea { 
            width: 90%; 
            max-width: 400px; 
            padding: 12px; 
            margin: 8px 0; 
            border: 2px solid #602d91; 
            border-radius: 10px 5px 12px 4px; /* irreg shp*/
            background: #fffdf0;
            font-family: 'Patrick Hand', cursive;
            font-size: 1.2rem;
        }

        #post-btn { 
            background: #602d91; 
            color: #ffffff; 
            border: none; 
            padding: 15px 40px; 
            cursor: pointer; 
            font-family: 'Gochi Hand', cursive;
            font-size: 1.4rem;
            border-radius: 5px;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
            box-shadow: 3px 4px 0px #333333;
        }

        #post-btn:active { transform: translateY(2px) translateX(1px); box-shadow: 1px 1px 0px #333333;}

        /* grid para tabi tabio */
        #posts { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 30px;
            padding: 40px 10px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* sticky note style padlet */
        .msg-item { 
            padding: 30px 20px; 
            text-align: center; 
            box-shadow: 5px 8px 15px rgba(0,0,0,0.1); 
            min-height: 180px;
            word-wrap: break-word;
            position: relative;
            transition: all 0.3s ease;
            color: #333333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-family: 'Gochi Hand', cursive;
            font-size: 1.2rem;
            /* Irreg paper cut */
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
        }

        /* tape effx */
        .msg-item::before {
            content: "";
            position: absolute;
            top: -10px;
            left: 30%;
            width: 80px;
            height: 30px;
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(-3deg);
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(2px);
        }

        /* konting liko para sa sa pad */
        .msg-item:nth-child(odd) { transform: rotate(-2deg); }
        .msg-item:nth-child(even) { transform: rotate(2deg); }
        .msg-item:nth-child(3n) { transform: rotate(1.5deg); }

        .msg-item:hover {
            transform: scale(1.05) rotate(0deg) !important;
            z-index: 5;
            box-shadow: 0px 15px 25px rgba(0,0,0,0.2);
        }

        .msg-item b {
            display: block;
            margin-bottom: 8px;
            color: #602d91;
            font-family: 'Patrick Hand', cursive;
            font-size: 1.1em;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="entry-button">
        <h1 style="font-family: 'Gochi Hand'; font-size: 4em; margin-bottom: 10px;">FOXIES PORTAL 🦊</h1>
        <p style="margin-bottom: 25px;">Ready to celebrate Line's Birthday?</p>
        <button onclick="startApp()" style="padding:15px 40px; background:#800080; color:#ffffff; border:2px solid #ffffff; border-radius:5px; cursor:pointer; font-family: 'Gochi Hand'; font-size: 1.5em; box-shadow: 4px 4px 0px #ffffff;">CLICK TO ENTER</button>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
  
    <div class="main-container">
        <div class="bday-card">
            <h2 style="color:#602d91; margin-top: 0; font-family: 'Gochi Hand'; font-size: 2.2em;">HAPPY BIRTHDAY MNL48 LINE!</h2>
            <p style="font-size: 1.3em;">Our makulit and energetic oshi!</p>
            <div style="font-size: 50px; margin-top: 15px;">🎂💜🦊</div>
        </div>
    </div>

    <div class="guestbook">
        <h2 style="font-family: 'Gochi Hand'; font-size: 2.5em; margin-bottom: 5px;">Fan Greeting Wall</h2>
        <p style="margin-top: 0;">Leave a message for our favorite Foxie!</p>
        
        <input type="text" id="fan-name" placeholder="Your Nickname" maxlength="20"><br>
        <textarea id="fan-msg" rows="4" placeholder="Write your heartfelt wish here..." maxlength="200"></textarea><br>
        
        <button id="post-btn" onclick="sendToFirebase()">Stick it on the wall! ✨</button>
        
        <div id="posts"></div>
    </div>

    <script>
        // tagal ko inayos to ayaw nya mag lagay 
        // medj nag pa hrelp ako dto sa ai AHAHAH
        const firebaseConfig = {
            apiKey: "AIzaSyAOnes7rwl0NPqeSkBJA1iGCfmWKBFaRUE",
            authDomain: "hbd-line-57dd2.firebaseapp.com",
            databaseURL: "https://hbd-line-57dd2-default-rtdb.firebaseio.com",
            projectId: "hbd-line-57dd2",
            storageBucket: "hbd-line-57dd2.firebasestorage.app",
            messagingSenderId: "19584731702",
            appId: "1:19584731702:web:010ab450c9ba09ffa96697",
            measurementId: "G-3R9PYW4S18"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // audio startup
        function startApp() {
            const entry = document.getElementById('entry-button');
            entry.style.opacity = '0';
            setTimeout(() => entry.style.display = 'none', 500);
            
            const audio = document.getElementById('bg-music');
            audio.play().catch(err => console.log("Audio blocked, click again."));
            
            // celeb
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        // Send Message to Firebase
        function sendToFirebase() {
            const nameEl = document.getElementById('fan-name');
            const msgEl = document.getElementById('fan-msg');
            const btn = document.getElementById('post-btn');

            if(nameEl.value.trim() !== "" && msgEl.value.trim() !== "") {
                db.ref('messages').push({ 
                    sender: nameEl.value, 
                    message: msgEl.value,
                    timestamp: Date.now()
                });

                // feedback
                msgEl.value = "";
                btn.innerText = "Posted! 💜";
                btn.style.background = "#4CAF50";

                // confetti pag ka submit
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.8 }
                });

                setTimeout(() => {
                    btn.innerText = "Stick it on the wall! ✨";
                    btn.style.background = "#602d91";
                }, 2000);
            } else {
                alert("Uy, sulat ka muna ng message! :)");
            }
        }

        // Listahan ng colors for padlet random
        const colors = ["#FFF78A", "#FFC5C5", "#C5EBAA", "#AEE6E6", "#E7BCDE", "#FFD1A4"];

        // display messages
        db.ref('messages').on('value', function(snap) {
            const list = document.getElementById('posts');
            list.innerHTML = "";
            
            const messages = [];
            snap.forEach(function(item) {
                messages.push(item.val());
            });

            // Newest at the top
            messages.reverse().forEach(function(data) {
                const randomBg = colors[Math.floor(Math.random() * colors.length)];
                
                const note = document.createElement('div');
                note.className = 'msg-item';
                note.style.backgroundColor = randomBg;
                note.innerHTML = `<b>${data.sender}:</b> ${data.message}`;
                
                list.appendChild(note);
            });
        });
    </script>
</body>
</html>
